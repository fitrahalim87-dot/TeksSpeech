<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b132b" />
      <stop offset="100%" stop-color="#1c2541" />
    </linearGradient>
    <linearGradient id="yellowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffea00" />
      <stop offset="100%" stop-color="#ffd000" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGradient)"/>
  <rect width="496" height="496" x="8" y="8" rx="104" fill="none" stroke="#ffea00" stroke-width="4" stroke-opacity="0.25"/>
  
  <!-- Icon: Glowing Audio Wave / Mic / Speech -->
  <g filter="url(#glow)" transform="translate(96, 96)">
    <!-- Central Speaker / Mic symbol -->
    <path d="M 120,80 L 170,80 L 230,30 L 230,290 L 170,240 L 120,240 Z" fill="url(#yellowGradient)"/>
    <rect x="80" y="115" width="40" height="90" rx="12" fill="url(#yellowGradient)"/>
    
    <!-- Sound Waves -->
    <path d="M 270,110 A 70,70 0 0,1 270,210" fill="none" stroke="url(#yellowGradient)" stroke-width="24" stroke-linecap="round"/>
    <path d="M 310,70 A 120,120 0 0,1 310,250" fill="none" stroke="url(#yellowGradient)" stroke-width="24" stroke-linecap="round"/>
  </g>
</svg>
