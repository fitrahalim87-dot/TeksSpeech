<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Dark Gradient -->
    <linearGradient id="anikiBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090d16" />
      <stop offset="50%" stop-color="#0f192d" />
      <stop offset="100%" stop-color="#162544" />
    </linearGradient>

    <!-- Gold Accent Gradient -->
    <linearGradient id="anikiGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffee55" />
      <stop offset="50%" stop-color="#facc15" />
      <stop offset="100%" stop-color="#eab308" />
    </linearGradient>

    <!-- Sound Wave Glow Filter -->
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <radialGradient id="centerRadial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#facc15" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#facc15" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background Base -->
  <rect width="512" height="512" rx="120" fill="url(#anikiBg)" />
  
  <!-- Subtle Glow Layer -->
  <circle cx="256" cy="256" r="200" fill="url(#centerRadial)" />

  <!-- Outer Border Ring -->
  <rect width="488" height="488" x="12" y="12" rx="108" fill="none" stroke="url(#anikiGold)" stroke-width="4" stroke-opacity="0.35" />

  <!-- Main Sound Wave & Microphone Artwork -->
  <g filter="url(#goldGlow)" transform="translate(256, 256)">
    <!-- Central Sound Waves (Equalizer Bars) -->
    <rect x="-140" y="-35" width="22" height="70" rx="11" fill="url(#anikiGold)" />
    <rect x="-95" y="-85" width="22" height="170" rx="11" fill="url(#anikiGold)" />
    <rect x="-50" y="-125" width="22" height="250" rx="11" fill="url(#anikiGold)" />
    
    <!-- Microphone Center Capsule -->
    <rect x="-15" y="-150" width="30" height="210" rx="15" fill="url(#anikiGold)" />
    <path d="M -50,10 A 50,50 0 0,0 50,10" fill="none" stroke="url(#anikiGold)" stroke-width="20" stroke-linecap="round" />
    <rect x="-10" y="60" width="20" height="50" rx="5" fill="url(#anikiGold)" />
    <rect x="-40" y="110" width="80" height="18" rx="9" fill="url(#anikiGold)" />

    <!-- Right Equalizer Sound Waves -->
    <rect x="28" y="-125" width="22" height="250" rx="11" fill="url(#anikiGold)" />
    <rect x="73" y="-85" width="22" height="170" rx="11" fill="url(#anikiGold)" />
    <rect x="118" y="-35" width="22" height="70" rx="11" fill="url(#anikiGold)" />
  </g>
</svg>
